name: Build and Deploy WebGL

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      # AI設定 (Inception + Gemini キー) を Resources/Config.json に書き出し。
      # GitHub Secret AI_CONFIG_JSON には以下のJSONをそのまま登録する:
      #   {"inception_api_key":"sk_...","gemini_api_key":"AIza..."}
      - name: Inject AI config
        run: |
          mkdir -p Assets/Resources
          printf '%s' '${{ secrets.AI_CONFIG_JSON }}' > Assets/Resources/Config.json

      # Unity WebGL ビルド
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          buildName: QuizArena

      # GitHub Pages 用にアーティファクトをアップロード
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/WebGL/QuizArena

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
